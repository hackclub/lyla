# https://app.slack.com/app-settings/T0266FRGM/A084UE0M623/app-manifest
display_information:
  name: LYLA
  description: The FD Record-Keep Hologram
  background_color: "#192f47"
  long_description: >-
    LYrate Lifeform Approximation, better known by her acronym LYLA, is an
    associate and the holographic companion of the Fire Department. LYLA helps
    out with record-keeping of Fire Department reports and actions taken. To
    learn more about how to use LYLA, check the Google Docs!
features:
  bot_user:
    display_name: LYLA
    always_online: false
  slash_commands:
    - command: /prevreports
      url: https://lyla.hackclub.com/slack/events
      description: Check a user's previous reports
      usage_hint: "[@userID | email] [slack | airtable]"
      should_escape: true
    - command: /lyla-assignees
      url: https://lyla.hackclub.com/slack/events
      description: Edit assignees for a case
      usage_hint: "[case number]"
      should_escape: false
    - command: /lyla-merge
      url: https://lyla.hackclub.com/slack/events
      description: Merge one case into another
      should_escape: false
oauth_config:
  redirect_urls:
    - "https://lyla.hackclub.com/slack/events"
  scopes:
    user:
      - "chat:write"
      - "search:read"
      - "users:read"
    bot:
      - "channels:history"
      - "channels:read"
      - "chat:write"
      - commands
      - "groups:history"
      - "groups:read"
      - "groups:write"
      - "im:history"
      - "mpim:history"
      - "pins:write"
      - "reactions:read"
      - "reactions:write"
      - "users.profile:read"
      - "users:read"
      - "users:read.email"
settings:
  event_subscriptions:
    request_url: https://lyla.hackclub.com/slack/events
    bot_events:
      - message.channels
      - message.groups
      - reaction_added
      - user_change
  interactivity:
    is_enabled: true
    request_url: https://lyla.hackclub.com/slack/events
    message_menu_options_url: https://lyla.hackclub.com/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
